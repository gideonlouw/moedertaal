<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moedertaal Playground</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <p class="eyebrow">MOEDERTAAL 0.2</p>
          <h1>Code in your own language.</h1>
          <p class="intro">Write, run, and share a small program without leaving the browser.</p>
        </div>
        <label>
          Language
          <select id="language"></select>
        </label>
      </header>

      <section class="workspace">
        <article class="panel editor-panel">
          <div class="panel-bar">
            <span>program.mt</span>
            <div class="actions">
              <button id="format" class="secondary">Format</button>
              <button id="run">Run program</button>
            </div>
          </div>
          <textarea id="code" spellcheck="false" aria-label="Moedertaal source code"></textarea>
        </article>

        <article class="panel output-panel">
          <div class="panel-bar"><span>Output</span><span id="status">Ready</span></div>
          <pre id="output" aria-live="polite">Press “Run program” to begin.</pre>
        </article>
      </section>

      <footer>
        <span>UTF-8 everywhere</span>
        <span>Lists · maps · loops · functions</span>
        <span>Open source</span>
      </footer>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
